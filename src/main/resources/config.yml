database:
  name: SQLite
  host: localhost
  port: 3306
  dbname: server
  username: root
  password: ''
server-mode: MULTI_ARENA
default-language: english
ranked:
  required:
    level: 1
lobby:
  chat:
    enabled: true
    delay-time: 3
  hotbar:
    profile:
      slot: 0
    shop:
      slot: 1
    players:
      slot: 7
  scoreboards-refresh-interval: 1
  npc-skin:
    deliveryman:
      skin-value: ""
      skin-signature: ""
  speed:
    enabled: true
    level: 1
  jump-boost:
    enabled: false
    level: 1
  motd:
    enabled: false
    header: "            &aExample Network &c[1.8-1.13]"
    footer: "        &aCome here and play the new SkyWars!"
  tablist:
    enabled: true
    header: "&bYou are playing on &a&lMC.EXAMPLE.NET\n "
    footer: " \n&aRanks, Boosters & MORE! &c&lSTORE.EXAMPLE.NET"
  connecting:
    party:
      not-leader-bypass: false
game:
  countdown:
    start: 45
    full: 10
  hotbar:
    kits:
      slot: 0
    quit:
      slot: 8
    compass:
      slot: 0
    quit-spectator:
      slot: 8
    play-again:
      slot: 7
  default-kit: true
mapselector:
  cooldown: 30
  permission: "lostskywars.mapselector.infinite"
