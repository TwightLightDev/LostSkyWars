# --- Mode names ---
mode:
  solo: "Solo"
  doubles: "Doubles"

# --- Cosmetic rarity names ---
rarity:
  common: "&7COMMON"
  uncommon: "&aUNCOMMON"
  rare: "&9RARE"
  epic: "&5EPIC"
  legendary: "&6LEGENDARY"
  mythic: "&cMYTHIC"

# --- Cosmetic display prefixes ---
cosmetic:
  default-kit: "Default"
  prefix: "SkyWars "
  kit: "Kit "
  perk: "Perk "
  cage: "Cage "
  deathcry: "Death Cry "
  trail: "Projectile Trail "
  killmessage: "Kill Message "
  killeffect: "Kill Effect "
  victorydance: "Victory Dance "
  title: "Title "
  ballon: "Ballon "
  spray: "Spray "

# --- Lobby ---
lobby:
  chat:
    delay-message: "&cYou must wait &a{time}s &cbetween send other message!"
    format: "&7[&a{level}&7] {display}{color}: {message}"
    format-ranked: "&7[{league}({points})&7] {display}{color}: {message}"
    format-duels: "&a[GAME] &7{colored}{color}: {message}"
    format-spectator: "&7[SPECTATOR] &7[&a{level}&7] {display}{color}: {message}"
  visibility:
    delay: "&cYou must wait &a{time}s &cbetween uses!"
  hotbar:
    profile:
      name: "&aMy Profile &7(Right Click)"
    shop:
      name: "&aShop &7(Right Click)"
    players:
      name-visible: "&fPlayers: &aVisible &7(Right Click)"
      name-hidden: "&fPlayers: &cHidden &7(Right Click)"
  npcs:
    play:
      connecting: "&aSending you to {world}!\n \n "
    box:
      already-in-use: "&cOnly one player can use the Mystery Vault at a time!"
      duplicate: "&aYou've received &b{frags} Mystery Dusts for already have {prefix} {item}&a!"
    well:
      holograms:
        - "&bSoul Well"
        - "&e&lRIGHT CLICK"
    box-npc:
      holograms:
        - "&bMystery Vault"
        - "&e&lRIGHT CLICK"
    deliveryman:
      holograms:
        - "&bThe Delivery Man"
        - "&e&lRIGHT CLICK"
    shopkeeper:
      holograms:
        - "&e&lCLICK TO OPEN!"
        - "&cShopkeeper"
    statsnpc:
      holograms:
        - "&6&lYour SkyWars Profile"
        - "Your Level: {level}"
        - "Progress: &b{exp}&7/&a{nextExp}"
        - "Total Wins: &a{wins}"
        - "Total Kills: &a{kills}"
        - "&e&lCLICK FOR STATS!"
  connecting:
    party:
      not-leader: "&cOnly the Party leader can find a match."

# --- Game ---
game:
  rewards-message:
    coins-per-play: "&6+{coins} SkyWars Coins Received (Play)."
    coins-per-kill: "&6+{coins} SkyWars Coins Received (Kill)."
    coins-per-win: "&6+{coins} SkyWars Coins Received (Game Win)."
    exp-per-play: "&d+{xp} SkyWars Experience Received (Play)."
    exp-per-kill: "&d+{xp} SkyWars Experience Received (Kill)."
    exp-per-win: "&d+{xp} SkyWars Experience Received (Game Win)."
    soul: "&b+{souls} Souls."
  event:
    start: "Start "
    refill: "Refill "
    doom: "Dragon "
    end: "End "
  hotbar:
    kits:
      name: "&aKit Selector &7(Right Click)"
    quit:
      name: "&c&lReturn to Lobby &7(Right Click)"
    compass:
      name: "&a&lTeleporter &7(Right Click)"
    quit-spectator:
      name: "&c&lReturn to Lobby &7(Right Click)"
    play-again:
      name: "&b&lPlay Again &7(Right Click)"
  broadcast:
    starting:
      join: "{colored} &ahas joined (&b{on}&a/&b{max}&a)!"
      left: "{colored} &chas left (&b{on}&c/&b{max}&c)!"
      start: "&aThe game starts in {time} &asecond{s}!"
      cage: "&aCages open in: {time} &asecond{s}!"
      selected-kit: "&aSelected Kit: {kit}"
      title: "&c{time}"
      subtitle: "&aPrepare to fight!"
    started:
      title: "{type_color}{type} MODE"
      subtitle: ""
    ingame:
      action-bar:
        remaining: "&eThere are &c{alive} &eplayers remaining!"
      death-messages:
        suicide:
          normal: "{display} &edied."
          void: "{display} &efell into the void."
        killed:
          normal: "{display} &ewas killed by {display2}&e."
          void: "{display} &ewas thrown into the void by {display2}&e."
          bow: "{display} &ewas shot by {display2}&e."
          mob: "{display} &ewas killed by {display2}'s mob."
  hologram:
    chest: "&e{time}"
    no-refill: "&cNo refill"
  player:
    ingame:
      receive-box: "&aYou've received a {stars} Star{s} Mystery Box!"
      title:
        join:
          up: "&aSkyWars"
          down: "{type_color}{type} Mode"
      titles:
        refill:
