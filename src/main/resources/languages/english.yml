# --- Commands ---
command:
  stats:
    args: "&cUse /stats <username>"
    permission: "&cYou must be &bMVP &cor higher to use this command!"
    user-not-found: "&cUser not found!"
  watch:
    args: "&cUse /watch <username>"
    permission: "&cYou must be &bMVP &cor higher to use this command!"
    user-not-found: "&cUser not found!"
    user-not-in-match: "&cUser isn't playing a match."
  join-game:
    permission: "&cYou must be &bMVP &cor higher to use this command!"
    args: "&cUse /joingame <world>"
    game-not-found: "&cInvalid world name."
    game-already-started: "&cGame already started."
  mapselector:
    no-arenas: "&cNo arenas available for this mode!"
    cooldown: "&cYou can only select a map once every {time} seconds!"

# --- Cosmetics: spray hologram ---
cosmetics:
  sprays:
    holograms: "&eClick!"

# --- Ranked ---
ranked:
  required:
    message: "&cYou need at least SkyWars Level 1 to play ranked SkyWars! Your Level can be seen on your xp bar in lobbies."

